name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}
      APP_ENV: ci
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/avito_watcher
      REDIS_URL: redis://localhost:6379/0
      OLLAMA_BASE_URL: http://localhost:11434
      SCRAPE_HEADLESS: "true"
      TELEGRAM_BOT_TOKEN: dummy
      TELEGRAM_CHAT_ID: dummy

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: avito_watcher
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d avito_watcher"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-asyncio ruff

      - name: Run Ruff lint
        run: ruff check app tests

      - name: Compile Python files
        run: python -m compileall app

      - name: Run tests
        run: pytest

      - name: Validate Docker Compose config
        run: |
          touch .env
          docker compose -f deploy/docker-compose.yml config

      - name: Run database migrations
        run: alembic upgrade head

      - name: Show current migration
        run: alembic current
