version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: avito_watcher
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  app:
    image: python:3.12-slim
    working_dir: /app
    command: bash -lc "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ..:/app
    env_file:
      - ../.env
    depends_on:
      - postgres
      - redis
      - ollama
    ports:
      - "8000:8000"

volumes:
  postgres_data:
  ollama_data:
